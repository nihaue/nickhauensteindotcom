<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ site.description }}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header */
        header {
            padding: 2rem 0;
            border-bottom: 1px solid #21262d;
        }
        header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .site-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f0f6fc;
            text-decoration: none;
            letter-spacing: -0.02em;
        }
        .site-title:hover { color: #58a6ff; }
        nav a {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.9rem;
            margin-left: 1.5rem;
            transition: color 0.2s;
        }
        nav a:hover { color: #f0f6fc; }

        /* Main */
        main {
            flex: 1;
            padding: 3rem 0;
        }

        /* Typography */
        h1, h2, h3, h4 { color: #f0f6fc; font-weight: 600; letter-spacing: -0.02em; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; line-height: 1.3; }
        h2 { font-size: 1.5rem; margin-top: 2rem; margin-bottom: 0.75rem; }
        h3 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        p { margin-bottom: 1.25rem; }

        a { color: #58a6ff; text-decoration: none; transition: color 0.2s; }
        a:hover { color: #79c0ff; text-decoration: underline; }

        strong { color: #f0f6fc; }

        ul, ol { margin-bottom: 1.25rem; padding-left: 1.5rem; }
        li { margin-bottom: 0.25rem; }

        blockquote {
            border-left: 3px solid #58a6ff;
            padding: 0.5rem 1rem;
            margin: 1.5rem 0;
            color: #8b949e;
            background: #161b22;
            border-radius: 0 6px 6px 0;
        }

        hr {
            border: none;
            border-top: 1px solid #21262d;
            margin: 2rem 0;
        }

        /* Code */
        code {
            background: #161b22;
            color: #e6edf3;
            padding: 0.15em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }
        pre {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1.5rem 0;
        }
        pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }

        /* Post list */
        .post-list { list-style: none; padding: 0; }
        .post-list li {
            padding: 1.25rem 0;
            border-bottom: 1px solid #21262d;
        }
        .post-list li:last-child { border-bottom: none; }
        .post-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0f6fc;
        }
        .post-title:hover { color: #58a6ff; }
        .post-meta {
            font-size: 0.85rem;
            color: #8b949e;
            margin-top: 0.25rem;
        }

        /* Post page */
        .post-header { margin-bottom: 2rem; }
        .post-header h1 { margin-bottom: 0.25rem; }
        .post-header .post-meta { margin-bottom: 0; }

        /* Images */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
        }

        /* Footer */
        footer {
            padding: 2rem 0;
            border-top: 1px solid #21262d;
        }
        footer p {
            font-size: 0.8rem;
            color: #484f58;
            margin: 0;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header .container {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }
            nav a:first-child { margin-left: 0; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a class="site-title" href="/">{{ site.title }}</a>
            <nav>
                <a href="/">Blog</a>
                <a href="/about">About</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}</p>
        </div>
    </footer>
</body>
</html>
